name: Jobs ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

concurrency:
  group: jobs-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingest jobs into Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Check required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing Supabase URL. Add a Repository secret or variable named SUPABASE_URL, or NEXT_PUBLIC_SUPABASE_URL."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing GitHub Actions secret SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

      - name: Run Supabase ingestion
        env:
          INGEST_WRITE: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run ingest:supabase

      - name: Upload ingestion report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jobs-ingestion-report
          path: ingestion/reports/latest-live.json
          if-no-files-found: ignore
